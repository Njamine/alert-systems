<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kakamega Forest Distress Alerts Dashboard</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        crossorigin=""
    />
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="./static/css/style.css" />
</head>
<body>
    <div class="dashboard-container">
        <header>
            <h1><i class="fa-solid fa-tree"></i> Kakamega Forest - Real-Time Distress Alerts</h1>
            <div class="update-info">Last update: <span id="update-time">--</span></div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <h3>Filter Alerts</h3>

                <div class="filter-group">
                    <label for="start-date">Start date</label>
                    <input type="date" id="start-date" />
                </div>
                <div class="filter-group">
                    <label for="end-date">End date</label>
                    <input type="date" id="end-date" />
                </div>
                <div class="filter-group">
                    <label for="severity-filter">Severity</label>
                    <select id="severity-filter" multiple size="3">
                        <option value="low">Low</option>
                        <option value="moderate">Moderate</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="cause-filter">Likely cause</label>
                    <select id="cause-filter" multiple size="3">
                        <option value="logging_trail">Logging trail</option>
                        <option value="selective_thinning">Selective thinning</option>
                        <option value="clearing">Clearing</option>
                    </select>
                </div>

                <button id="apply-filters" type="button">Apply Filters</button>

                <div class="stats">
                    <h4>Summary</h4>
                    <p>Total alerts: <span id="total-alerts">0</span></p>
                    <p>Total area disturbed: <span id="total-area">0.00</span> ha</p>
                    <p>Avg confidence: <span id="avg-confidence">0</span>%</p>
                </div>
            </aside>

            <div id="map"></div>

            <div class="alert-table-panel">
                <button id="toggle-table" type="button">Show / Hide Alert Table</button>
                <div id="alert-table-container" class="hidden">
                    <table id="alert-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Date</th>
                                <th>Area (ha)</th>
                                <th>Severity</th>
                                <th>Cause</th>
                                <th>Confidence</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer>
            Data source: Sentinel-1 and Sentinel-2. Alerts updated every 12 hours.
        </footer>
    </div>

    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        crossorigin=""
    ></script>
    <script src="./static/js/map.js"></script>
</body>
</html>
